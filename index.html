<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>第5回 CS杯 ～FINAL～</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:#000;
  position:relative;
  font-family:sans-serif;
}

.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.15);
}

.button-area{
  position:absolute;
  bottom:14%;
  left:50%;
  transform:translateX(-50%);
  width:90%;
  display:flex;
  justify-content:space-between;
  gap:14px;
}

.btn{
  flex:1;
  padding:18px 10px;
  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.join{
  background:#d4a437;
  color:#000;
}

.decline{
  background:#444;
  color:#fff;
}

.btn:active{
  transform:scale(0.96);
}
</style>
</head>

<body>

<img
  class="bg"
  src="EB4DB536-B1D4-49A7-9AC1-D40643F26685.png"
>

<div class="overlay"></div>

<div class="button-area">
  <button class="btn join" onclick="join()">
    参戦する
  </button>

  <button class="btn decline" onclick="decline()">
    辞退する
  </button>
</div>

<script>
const params = new URLSearchParams(location.search);
const player = params.get("player") || "参加者";

function join(){
  alert(player + " さんが参戦しました！");
}

function decline(){
  alert(player + " さんが辞退しました！");
}
</script>

</body>
</html>
