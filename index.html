<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>第5回 CS杯 ～FINAL～</title>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

.container{
  width:100%;
  max-width:430px;
  padding:20px;
  text-align:center;
}

.title{
  font-size:42px;
  font-weight:bold;
  line-height:1.2;
  margin-bottom:20px;
}

.gold{
  color:#d4a437;
}

.player{
  font-size:24px;
  margin-bottom:40px;
}

.card{
  border:1px solid #d4a437;
  border-radius:18px;
  padding:24px;
  margin-bottom:30px;
  background:#111;
}

.info{
  font-size:22px;
  margin-bottom:14px;
}

.sub{
  color:#aaa;
  line-height:1.7;
}

.buttons{
  display:flex;
  gap:14px;
  margin-top:30px;
}

button{
  flex:1;
  padding:18px;
  border:none;
  border-radius:14px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
}

.join{
  background:#d4a437;
  color:#000;
}

.decline{
  background:#444;
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

<div class="title">
第5回<br>
<span class="gold">CS杯 ～FINAL～</span>
</div>

<div class="player" id="playerName">
招待プレイヤー
</div>

<div class="card">
<div class="info">
2026.6.8 MON
</div>

<div class="info">
ラディアーレ三ノ宮
</div>

<div class="sub">
なお、本大会は招待者限定です。<br>
貴殿の参戦を確認次第、<br>
トーナメント表へ登録されます。
</div>
</div>

<div class="buttons">
<button class="join" onclick="join()">
参戦する
</button>

<button class="decline" onclick="decline()">
辞退する
</button>
</div>

</div>

<script>
const params = new URLSearchParams(location.search);
const player = params.get("player") || "招待プレイヤー";

document.getElementById("playerName").innerText =
player + " 殿";

function join(){
  window.open(
    "https://docs.google.com/forms/d/e/1FAIpQLSeRmUcS0EGjsAmZCAe5naIAePwXdt1pvchyNNbDdRQTaXX2QQ/viewform?usp=pp_url&entry.2102584332=" + encodeURIComponent(player),
    "_blank"
  );
}

function decline(){
  alert(player + " さんが辞退しました！");
}
</script>

</body>
</html>
